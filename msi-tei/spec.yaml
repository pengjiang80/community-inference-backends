backend_name: MIS-TEI
description: |
  MIS-TEI (https://www.hiascend.com/developer/ascendhub/detail/07a016975cc341f3a5ae131f2b52399d) is an inference service for text embedding and reranking models in the Ascend ecosystem.
  It provides efficient vector generation and relevance scoring capabilities, commonly used in RAG, semantic search, and retrieval systems.
  Based on the Ascend CANN stack, it supports multiple embedding and reranker models with optimized performance on Ascend hardware.
  This backend uses a repackaged image to simplify deployment and integration within GPUStack environments.
health_check_path: /
default_run_command: --model-id {{model_path}} -p {{port}}
version_configs:
  v2.7.0:
    image_name: gpustackcommunity/mis-tei:7.3.0-800I-A2-aarch64
    custom_framework: cann
default_version: v7.3.0
