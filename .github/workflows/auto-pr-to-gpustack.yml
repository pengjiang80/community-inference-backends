name: Auto PR to gpustack

on:
  push:
    branches:
      - main

concurrency:
  group: auto-pr-to-gpustack-main
  cancel-in-progress: true

jobs:
  build-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gpustack
        uses: actions/checkout@v4
        with:
          repository: gpustack/gpustack

      - name: Run make install
        run: make install

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GP_PAT }}
          push-to-fork: foyoux/gpustack
          add-paths: gpustack/assets/community-inference-backends.yaml
          commit-message: "chore: update community-inference-backends"
          title: "chore: auto update community-inference-backends"
          body: |
            Auto-generated PR to update `gpustack/assets/community-inference-backends.yaml` from the latest upstream changes.

            💡 **Dynamic update, simply merge before the next release.**
          branch: chore/auto-update-backends
          base: main
